<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title data-i18n="extensionName">护眼助手</title>
    <style>
        body {
            width: 400px;
            padding: 20px;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }
        .status {
            margin: 0 20px;
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }
        #toggleBtn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #toggleBtn:hover {
            background-color: #45a049;
        }
        #toggleBtn:disabled {
            background-color: #cccccc;
        }
        .settings {
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .settings-disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .mode-section {
            margin-bottom: 20px;
        }
        .mode-section h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #333;
        }
        .color-picker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .color-picker label {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }
        .color-picker input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .preset-modes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .mode-button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .mode-button:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .mode-button.active {
            border: 2px solid #4CAF50;
            background-color: #e8f5e9;
        }
        .mode-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .exclude-sites {
            margin-top: 15px;
        }
        .exclude-sites label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .exclude-urls {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
        .custom-modes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .custom-mode-slot {
            padding: 12px;
            border: 2px dashed #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .custom-mode-slot:hover {
            border-color: #4CAF50;
            background-color: #f5f5f5;
        }
        .custom-mode-slot.empty::before {
            content: "+";
            font-size: 24px;
            color: #999;
            margin-bottom: 8px;
        }
        /* Removed hardcoded content, now handled in JS/HTML */
        .custom-mode-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .custom-mode-item:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .custom-mode-item.active {
            border: 2px solid #4CAF50;
            background-color: #e8f5e9;
        }
        .custom-mode-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .custom-mode-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        .custom-mode-colors {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .custom-mode-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .custom-mode-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .custom-mode-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .custom-mode-btn.apply {
            background-color: #4CAF50;
            color: white;
        }
        .custom-mode-btn.apply:hover {
            background-color: #45a049;
        }
        .custom-mode-btn.delete {
            background-color: #f44336;
            color: white;
        }
        .custom-mode-btn.delete:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 data-i18n="extensionName">护眼助手</h2>
            <div class="status" id="status" data-i18n="statusDisabled">状态：未启用</div>
            <button id="toggleBtn" data-i18n="enableButton">启用</button>
        </div>
        
        <div class="settings" id="settingsContainer">
            <div class="color-picker">
                <label>
                    <span data-i18n="backgroundColor">背景颜色</span>
                    <input type="color" id="bgColor" value="#FFFFFF">
                </label>
                <label>
                    <span data-i18n="textColor">文字颜色</span>
                    <input type="color" id="textColor" value="#000000">
                </label>
            </div>
            
            <div class="mode-section">
                <h3 data-i18n="presetModes">预设模式</h3>
                <div class="preset-modes" id="presetModes">
                    <!-- 预设模式按钮将通过JavaScript动态添加 -->
                </div>
            </div>
            
            <div class="mode-section">
                <h3 data-i18n="customModes">自定义模式</h3>
                <div class="custom-modes" id="customModes">
                    <!-- 自定义模式将通过JavaScript动态添加 -->
                </div>
            </div>
            
            <div class="exclude-sites">
                <label for="excludedUrls" data-i18n="excludeSites">排除网站（每行一个）：</label>
                <textarea id="excludedUrls" class="exclude-urls" rows="3" data-i18n-placeholder="excludeSitesPlaceholder"></textarea>
                <div class="help-text" data-i18n="excludeSitesHelp">
                    支持通配符 *，例如 *.youtube.com 会匹配所有youtube子域名
                </div>
            </div>
        </div>
    </div>
    <script src="translations.js"></script>
    <script src="popup.js"></script>
</body>
</html>
